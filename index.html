<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="mobile-web-app-capable" content="yes">
        <title>Ninjack</title>
	<!-- Link to styles.css -->
	<link rel="stylesheet" href="styles/styles.css?v=8">
</head>
<body class="noselect" role="application">
	<div class="outlined game-title">Ninjack</div>
	<div class="game">
		<div class="menu-bar">
			<div class="outlined menu-section inventory" id="inventory"></div>
			<div class="outlined menu-section inventory" id="stats"></div>
		</div>
		<div id="world"></div>
	</div>
	<div id="notification-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></div>
	<div id="controls">
		<button onclick="move('up')">⬆️</button>
		<div>
			<button class="leftright" onclick="move('left')">⬅️</button>
			<button class="leftright" onclick="move('right')">➡️</button>
		</div>
		<button onclick="move('down')">⬇️</button>
	</div>
	<script src="scripts/constants.js?v=2"></script>
	<script src="scripts/state.js?v=5"></script>
	<script src="scripts/timer.js?v=2"></script>
	<script src="scripts/tileUtils.js?v=3"></script>
	<script src="scripts/ui.js?v=2"></script>
	<script src="scripts/worldGen.js?v=8"></script>
	<script src="scripts/snake.js?v=3"></script>
	<script src="scripts/save.js?v=8"></script>
	<script src="scripts/game.js?v=9"></script>
	<script src="scripts/player.js?v=6"></script>
	<script src="scripts/menu.js?v=8"></script>
	<script src="scripts/main.js?v=7"></script>
</body>
</html>
