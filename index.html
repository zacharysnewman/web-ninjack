	<script>
		(function() {
			var sp = new URLSearchParams(location.search);
			if (sp.has('reset')) { localStorage.clear(); location.replace(location.pathname); return; }
			if (sp.has('gold')) { location.replace('gold.html'); return; }
			if (sp.has('house-plan')) { location.replace('house-plan.html'); return; }
			if (sp.has('animations')) { location.replace('animations.html'); return; }
			if (sp.has('spec')) { location.replace('docs.html#game-spec'); return; }
			if (sp.get('soundboard') === 'true') { location.replace('docs.html#soundboard'); return; }
			if (sp.has('slitherwood')) { location.replace('slitherwood.html'); return; }
			if (sp.has('docs')) { location.replace('docs.html' + (sp.get('docs') ? '#' + sp.get('docs') : '')); return; }
		})();
	</script>
