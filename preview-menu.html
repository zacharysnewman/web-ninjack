<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Preview</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; }

    #main-menu {
      position: fixed;
      inset: 0;
      z-index: 100;
      overflow: hidden;
      background-color: #1a3a1a;
    }

    #menu-tree-bg {
      position: absolute;
      inset: 0;
      font-size: 6.75vmin;
      line-height: 1.15;
      word-break: break-all;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    #menu-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 20, 0, 0.55);
      z-index: 1;
      pointer-events: none;
    }

    #menu-content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2em;
    }

    /* Title — no background, no border-radius */
    .menu-title {
      font-size: clamp(2.8rem, 11vmin, 6.5rem);
      margin: 0;
      color: #d4ffd4;
      text-shadow: 3px 3px 0 #003300, 0 0 24px rgba(0,255,0,0.35);
      letter-spacing: 0.06em;
    }

    /* Start button — light green outline matching game board tile border (forestgreen) */
    #menu-start {
      font-size: clamp(1.2rem, 5vmin, 2rem);
      padding: 0.55em 2.2em;
      background: linear-gradient(160deg, #1a6b1a, #0e420e);
      color: #d4ffd4;
      border: 2px solid forestgreen;
      border-radius: 14px;
      cursor: pointer;
      font-family: Arial, sans-serif;
      font-weight: bold;
      letter-spacing: 0.05em;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      touch-action: manipulation;
    }

    #menu-start:hover {
      background: linear-gradient(160deg, #227722, #134813);
      border-color: #88dd88;
      transform: scale(1.06);
      box-shadow: 0 6px 22px rgba(0,0,0,0.55), 0 0 14px rgba(80,200,80,0.3);
    }
    #menu-start:active { transform: scale(0.97); }

    /* Skin dropdown */
    .skin-dropdown-wrapper {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .skin-label {
      font-size: 0.75rem;
      color: #88cc88;
      font-family: Arial, sans-serif;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .skin-dropdown-inner {
      position: relative;
    }

    /* Skin button — light green outline matching game board tile border (forestgreen) */
    .skin-dropdown-btn {
      font-size: clamp(1.4rem, 5.5vmin, 2rem);
      background: rgba(10, 60, 10, 0.9);
      border: 2px solid forestgreen;
      border-radius: 10px;
      cursor: pointer;
      padding: 6px 12px;
      touch-action: manipulation;
      line-height: 1;
      color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .skin-dropdown-btn:hover { border-color: #88dd88; }

    .skin-dropdown-popup {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      right: 0;
      background: rgba(10, 50, 10, 0.97);
      border: 2px solid forestgreen;
      border-radius: 12px;
      padding: 6px;
      flex-direction: column;
      gap: 4px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.6);
    }

    .skin-dropdown-popup.open {
      display: flex;
    }

    .skin-option {
      font-size: clamp(1.4rem, 5.5vmin, 2rem);
      background: transparent;
      border: 2px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      padding: 4px 10px;
      touch-action: manipulation;
      line-height: 1;
      text-align: left;
    }

    .skin-option.skin-selected { border-color: gold; background: rgba(0, 100, 0, 0.8); }
    .skin-option:hover { border-color: #88dd88; background: rgba(0,80,0,0.5); }
  </style>
</head>
<body>
  <div id="main-menu">
    <div id="menu-tree-bg" aria-hidden="true"></div>
    <div id="menu-overlay"></div>

    <div id="menu-content">
      <h1 class="menu-title">Ninjack</h1>
      <button id="menu-start">Start</button>
    </div>

    <div class="skin-dropdown-wrapper">
      <span class="skin-label">Ninja Skin</span>
      <div class="skin-dropdown-inner">
        <div class="skin-dropdown-popup" id="skin-popup"></div>
        <button class="skin-dropdown-btn" id="skin-dropdown-btn">🥷 ▾</button>
      </div>
    </div>
  </div>

  <script>
    const SKIN_OPTIONS = ['🥷', '🥷🏻', '🥷🏼', '🥷🏽', '🥷🏾', '🥷🏿'];
    let NINJA = '🥷';

    document.getElementById('menu-tree-bg').textContent = '🌲'.repeat(600);

    const popup = document.getElementById('skin-popup');
    const dropdownBtn = document.getElementById('skin-dropdown-btn');
    let popupOpen = false;

    function closePopup() { popupOpen = false; popup.classList.remove('open'); }
    function openPopup()  { popupOpen = true;  popup.classList.add('open'); }

    SKIN_OPTIONS.forEach(skin => {
      const btn = document.createElement('button');
      btn.className = 'skin-option' + (skin === NINJA ? ' skin-selected' : '');
      btn.textContent = skin;
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        NINJA = skin;
        dropdownBtn.textContent = skin + ' ▾';
        popup.querySelectorAll('.skin-option').forEach(b =>
          b.classList.toggle('skin-selected', b.textContent === skin)
        );
        closePopup();
      });
      popup.appendChild(btn);
    });

    dropdownBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      popupOpen ? closePopup() : openPopup();
    });

    document.addEventListener('click', () => closePopup());
  </script>
</body>
</html>
